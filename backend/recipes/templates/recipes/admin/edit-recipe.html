<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Yummy - Edit-recipe</title>
    <link rel="stylesheet" href="../../src/css/style.css">
</head>

<body>
    <div id="navbar">
        <nav class="main-nav">
            <div class="logo">Yummy</div>
            <ul class="nav-links">
                <li><a href="{% url 'cover' %}">Team</a></li>
                <li><a href="{% url 'home' %}">Home</a></li>
                <li><a href="{% url 'search' %}">Search</a></li>
                <li><a href="{% url 'favorites' %}">Favorites</a></li>
                {% if user.is_staff %}
                <li><a href="{% url 'admin_recipe' %}">Admin</a></li>
                {% endif %}
                <li><a href="{% url 'add_recipe' %}">Add Recipe</a></li>
                <li><a href="{% url 'login' %}">Login</a></li>
                <li><a href="{% url 'signup' %}">Sign Up</a></li>
            </ul>
        </nav>
    </div>

    <div class="page-wrapper">
        <div class="edit-card">
            <h1>Edit Recipe 📝</h1>
            <form>
                <div class="form-group">
                    <label>Recipe Name</label>
                    <input type="text" class="form-input" name="recipe_name" value="Salad" required>
                </div>

                <div class="form-group">
                    <label>Course Type</label>
                    <select class="form-input" name="course_type">
                        <option>Main-Course</option>
                        <option>Appetizers</option>
                        <option>Healthy</option>
                        <option>Bakery</option>
                        <option>Drinks</option>
                        <option>Dessert</option>
                    </select>
                </div>

                <div class="ingredients-section">
                    <label>Ingredients</label>
                    <div class="ingredient-row">
                        <input type="text" class="form-input" placeholder="Ingredient" value="Lettuce">
                        <input type="text" class="form-input" placeholder="Quantity" value="1 cup">
                    </div>
                    <div class="ingredient-row">
                        <input type="text" class="form-input" placeholder="Ingredient" value="Tomato">
                        <input type="text" class="form-input" placeholder="Quantity" value="1">
                    </div>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea class="form-input" name="description"
                        rows="4">Cut vegetables and mix with olive oil and lemon juice.</textarea>
                </div>

                <button type="submit" class="btn-main">Update Recipe</button>
            </form>
        </div>
    </div>



    <script>
        // 1. Get the ID from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const recipeId = urlParams.get('id');

        // 2. Load the recipes from storage
        let recipes = JSON.parse(localStorage.getItem('recipes')) || [];
        let recipeToEdit = recipes.find(r => r.id == recipeId);

        // 3. Fill the form if the recipe exists
        if (recipeToEdit) {
            document.getElementById('recipeName').value = recipeToEdit.name;
            document.getElementById('recipeCourse').value = recipeToEdit.course;
            document.getElementById('recipeIngredients').value = recipeToEdit.ingredients || "";
        }

        // 4. Save the changes
        document.getElementById('editRecipeForm').onsubmit = function (e) {
            e.preventDefault();

            // Update the specific recipe in the array
            recipeToEdit.name = document.getElementById('recipeName').value;
            recipeToEdit.course = document.getElementById('recipeCourse').value;
            recipeToEdit.ingredients = document.getElementById('recipeIngredients').value;

            // Save back to localStorage
            localStorage.setItem('recipes', JSON.stringify(recipes));

            // Go back to the Admin list
            window.location.href = 'admin_recipe.html';
        };
    </script>

</body>
