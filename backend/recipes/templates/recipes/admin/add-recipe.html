{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Yummy - Add Recipe</title>
    <!-- تحديث مسار الـ CSS لنظام Django -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div id="navbar">
        <nav class="main-nav">
            <div class="logo">Yummy 🍲</div>
            <ul class="nav-links">
                <!-- استخدام أسماء الروابط المعرفة في urls.py بدلاً من مسارات الملفات -->
                <li><a href="{% url 'cover' %}">Team</a></li>
                <li><a href="{% url 'home' %}">Home</a></li>
                <li><a href="{% url 'search' %}">Search</a></li>
                <li><a href="{% url 'favorites' %}">Favorites</a></li>
                <li><a href="{% url 'admin_recipe' %}">Admin</a></li>
                <li><a href="{% url 'add_recipe' %}">Add Recipe</a></li>
            </ul>
        </nav>
    </div>

    <div class="page-wrapper">
        <div class="edit-card">
            <h2>Add New Recipe</h2>
            <form id="addRecipeForm">
                <div class="form-grid">
                    <input type="text" id="recipeName" class="form-input" placeholder="Recipe Name" required>
                    <select id="recipeCourse" class="form-input">
                        <option value="Main-course">Main-course</option>
                        <option value="Dessert">Dessert</option>
                        <option value="Appetizers">Appetizers</option>
                        <option value="Healthy">Healthy Food</option>
                        <option value="Bakery">Bakery</option>
                        <option value="Drinks">Drinks</option>
                    </select>
                </div>
                
                <div class="ingredients-section">
                    <h4>Ingredients</h4>
                    <textarea id="recipeIngredients" class="form-input" placeholder="List ingredients here..."></textarea>
                </div>

                <button type="submit" id="saveBtn" class="btn-main">Save Recipe</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('addRecipeForm').onsubmit = function(e) {
            e.preventDefault();
            
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerText = "Saving...";

            // 1. جلب الوصفات الموجودة من الـ LocalStorage
            let recipes = JSON.parse(localStorage.getItem('recipes')) || [];
            
            // 2. بناء كائن الوصفة الجديدة
            const newRecipe = {
                id: Date.now().toString(),
                name: document.getElementById('recipeName').value,
                course: document.getElementById('recipeCourse').value,
                ingredients: document.getElementById('recipeIngredients').value
            };

            // 3. الحفظ في localStorage
            recipes.push(newRecipe);
            localStorage.setItem('recipes', JSON.stringify(recipes));
            
            // 4. التوجيه لصفحة الـ Admin باستخدام مسار Django
            window.location.href = "{% url 'admin_recipe' %}";
        };
    </script>
</body>

</html>
