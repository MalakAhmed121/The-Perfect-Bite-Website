{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Yummy-Recipes</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<style>
    .recipes-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 35px;
        padding: 25px;
        max-width: 1200px;
        margin: 0 auto;
    }

    /* Recipe Card Shared Styles */
    .recipe {
        height: 400px;
        border-radius: 40px;
        padding: 25px;
        margin-top: -20px;
        box-shadow: 0px 0px 2px white;
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        color: white;
        text-shadow: 0px 0px 3px black;
    }

    .recipe:hover {
        transform: translateY(-5px);
    }

    /* Recipe Card Buttons */
    .recipe a {
        margin-top: auto;
        align-self: center;
        margin-top: 250px;
        margin-left: 10PX;
        padding: 10px 30px;
        text-align: center;
        border-radius: 20px;
        color: #dcb8a0;
        font-size: 16px;
        font-family: 'Times New Roman', Times, serif;
        text-decoration: none;
        display: inline-block;
    }

    .recipe a:hover {
        transform: translateY(-5px);
    }

    #maindish {
        background-image: url('/static/maindish/Main-dish.jfif');
    }

    #bakery {
        background-image: url('/static/bakeryimages/bakery1.jpeg');
    }

    #healthy-food {
        background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.4)),
            url('/static/Healthy_images/healthy-salad.jpg');
    }

    #drinks {
        background-image: url('/static/drinksimages/drink2.png');
    }

    #appetizers {
        background-image: url('/static/appetizersimgs/main1.jpg');
    }

    #dessert {
        background-image: url('/static/dessertimages/cover.jpg');
    }
</style>

<body style="background-color: #f2e7df; text-align: center;">
    <div id="navbar">
        <nav class="main-nav">
            <div class="logo">Yummy</div>
            <ul class="nav-links">
                <li><a href="{% url 'cover' %}">Team</a></li>
                <li><a href="{% url 'home' %}">Home</a></li>
                <li><a href="{% url 'search' %}">Search</a></li>
                <li><a href="{% url 'favorites' %}">Favorites</a></li>
                <li><a href="{% url 'admin_recipe' %}">Admin</a></li>
                <li><a href="{% url 'add_recipe' %}">Add Recipe</a></li>
                <li><a href="{% url 'login' %}">Login</a></li>
                <li><a href="{% url 'signup' %}">Sign Up</a></li>
            </ul>
        </nav>
    </div>
    
    <h1>Recipes</h1>

    <section class="recipes-container">
        <div class="recipe" id="maindish">
            <h2>Main Dishes</h2>
            <a href="{% url 'main_dish' %}" class="btn-main">View Recipes</a>
        </div>
        
        <div class="recipe" id="healthy-food">
            <h2>Healthy Food</h2>
            <a href="{% url 'healthy' %}" class="btn-main">View Recipes</a>
        </div>

        <div class="recipe" id="bakery">
            <h2>Bakery</h2>
            <a href="{% url 'bakery' %}" class="btn-main">View Recipes</a>
        </div>

        <div class="recipe" id="dessert">
            <h2>Desserts</h2>
            <a href="{% url 'dessert' %}" class="btn-main">View Recipes</a>
        </div>

        <div class="recipe" id="appetizers">
            <h2>Appetizers</h2>
            <a href="{% url 'appetizers' %}" class="btn-main">View Recipes</a>
        </div>
        
        <div class="recipe" id="drinks">
            <h2>Drinks</h2>
            <a href="{% url 'drinks' %}" class="btn-main">View Recipes</a>
        </div>
    </section>
</body>
</html>
