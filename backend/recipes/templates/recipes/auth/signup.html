{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yummy - Sign Up</title>
    <meta name="description" content="This is our Recipes Finder Website!">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body style="background-color: #f2e7df; text-align: center;">
    <div id="navbar">
        <nav class="main-nav">
            <div class="logo">Yummy</div>
            <ul class="nav-links">
                <li><a href="{% url 'cover' %}">Team</a></li>
                <li><a href="{% url 'home' %}">Home</a></li>
                <li><a href="{% url 'search' %}">Search</a></li>
                <li><a href="{% url 'favorites' %}">Favorites</a></li>
                <li><a href="{% url 'admin_recipe' %}">Admin</a></li>
                <li><a href="{% url 'add_recipe' %}">Add Recipe</a></li>
                <li><a href="{% url 'login' %}">Login</a></li>
                <li><a href="{% url 'signup' %}">Sign Up</a></li>
            </ul>
        </nav>
    </div>

    <div class="signup-page-wrapper">
        <h1 class="welcome-msg">Welcome to YUMMY! 😊</h1>

        <div class="signup-container">
            <div class="signup-image">
                <img src="{% static 'siggnup.jpg' %}" alt="Delicious Food">
            </div>

            <div class="form-section">
                <form action="{% url 'home' %}" method="GET">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" class="form-input" required placeholder="Enter your username" name="user">
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-input" placeholder="Min 5 characters" name="password" required minlength="5" maxlength="8">
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" class="form-input" name="confirm_password" required placeholder="Confirm your password">
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" class="form-input" name="email" placeholder="Enter your email">
                    </div>

                    <button type="submit" class="btn-main">Create Account</button>
                    <div class="Login-link">
                        <span>Already have an account? <a href="{% url 'login' %}">Login</a></span>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
