{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yummy - Login</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body style="background-color: #f2e7df; text-align: center;">
    <div id="navbar">
        <nav class="main-nav">
            <div class="logo">Yummy</div>
            <ul class="nav-links">
                <li><a href="{% url 'cover' %}">Team</a></li>
                <li><a href="{% url 'home' %}">Home</a></li>
                <li><a href="{% url 'search' %}">Search</a></li>
                <li><a href="{% url 'favorites' %}">Favorites</a></li>
                <li><a href="{% url 'admin_recipe' %}">Admin</a></li>
                <li><a href="{% url 'add_recipe' %}">Add Recipe</a></li>
                <li><a href="{% url 'login' %}">Login</a></li>
                <li><a href="{% url 'signup' %}">Sign Up</a></li>
            </ul>
        </nav>
    </div>

    <div class="login-page-wrapper">
        <h1 class="welcome-msg">Welcome Back to YUMMY! 😊</h1>

        <div class="login-container">
            <div class="login-image">
                <img src="{% static 'login.jpg' %}" alt="Delicious Food">
            </div>

            <div class="form-section">
                <form action="{% url 'home' %}" method="GET">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" class="form-input" required placeholder="Enter your username" name="user">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-input" placeholder="Min 5 characters" name="password" required minlength="5" maxlength="8">
                    </div>
                    <div class="form-group">
                        <label>Type of User</label>
                        <select class="form-input" name="user_type">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn-main">Login</button>
                    </div>
                    <div class="Signup-link">
                        <span>Don't have an account? <a href="{% url 'signup' %}">Sign Up</a></span>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
